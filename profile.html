<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MOVIEZ — My Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles/main.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.avatar-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center}
.avatar-modal-img{max-width:90vw;max-height:90vh;border-radius:12px;object-fit:contain}
.avatar-modal-close{position:fixed;top:20px;right:20px;font-size:28px;color:#fff;cursor:pointer;z-index:201;line-height:1}
.edit-field{width:100%;background:var(--surface2);border:0.5px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s;resize:none}
.edit-field:focus{border-color:var(--red)}
.edit-field::placeholder{color:#3a3a3a}
.save-btn{background:var(--red);border:none;border-radius:8px;padding:8px 16px;color:#fff;font-size:13px;cursor:pointer}
.quote-display{font-size:13px;color:var(--text-muted);font-style:italic;line-height:1.6;padding:10px 14px;background:var(--surface2);border-left:2px solid var(--red);border-radius:0 8px 8px 0;cursor:pointer}
.fav-movie-display{font-size:13px;color:var(--text-muted);padding:8px 0;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.fav-movie-display:hover{color:var(--text)}
.edit-hint{font-size:11px;color:var(--text-hint);margin-top:6px}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="avatar-modal" style="display:none"></div>
<input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="uploadAvatar(this)"/>

<nav class="nav">
  <div class="logo">MOVIE<span>Z</span></div>
  <div class="nav-right">
    <button class="action-btn" style="flex:none;padding:6px 14px;font-size:12px" onclick="window.location.href='rankings.html'">Rankings</button>
    <div class="avatar" id="nav-avatar" style="overflow:hidden;padding:0"></div>
  </div>
</nav>

<main>
  <div class="tab-row">
    <button class="tab active" onclick="switchTab('profile', this)">My profile</button>
    <button class="tab" onclick="switchTab('history', this)">Quiz history</button>
  </div>
  <div class="pane active" id="pane-profile">
    <div class="loading"><div class="loading-dot"></div><p>Loading your profile...</p></div>
  </div>
  <div class="pane" id="pane-history">
    <div class="loading"><div class="loading-dot"></div><p>Loading quiz history...</p></div>
  </div>
</main>

<script src="lib/supabase.js"></script>
<script>
let currentUser = null;
let currentProfile = null;
let editingField = null;

async function init() {
  const auth = await requireAuth();
  if (!auth) return;
  currentUser = auth.user;
  currentProfile = auth.profile;
  updateNavAvatar();
  renderProfile();
  loadQuizHistory();
}

function updateNavAvatar() {
  const el = document.getElementById('nav-avatar');
  if (!el) return;
  if (currentProfile?.avatar_url) {
    el.innerHTML = `<img src="${currentProfile.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
    el.style.padding = '0';
  } else {
    el.textContent = (currentProfile?.username || '?').slice(0, 2).toUpperCase();
    el.style.padding = '';
  }
}

function showAvatarModal(url) {
  const modal = document.getElementById('avatar-modal');
  modal.style.display = 'block';
  modal.innerHTML = `
    <div class="avatar-modal-overlay" onclick="closeAvatarModal()">
      <span class="avatar-modal-close" onclick="closeAvatarModal()">✕</span>
      <img class="avatar-modal-img" src="${escHtml(url)}" onclick="event.stopPropagation()"/>
    </div>`;
}

function closeAvatarModal() {
  const modal = document.getElementById('avatar-modal');
  modal.style.display = 'none';
  modal.innerHTML = '';
}

function renderProfile() {
  const p = currentProfile;
  if (!p) return;

  const watched  = p.total_watched || 0;
  const streak   = p.streak_count  || 0;
  const stars    = p.stars_earned  || 0;
  const rank     = getRank(watched);
  const joined   = new Date(p.joined_date || Date.now()).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
  const initials = p.username.slice(0, 2).toUpperCase();

  const avatarHtml = p.avatar_url
    ? `<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`
    : initials;

  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const today = new Date();
  const todayIdx = today.getDay() === 0 ? 6 : today.getDay() - 1;
  const lastWatched = p.last_watched_date ? new Date(p.last_watched_date) : null;

  const streakDots = days.map((d, i) => {
    let cls = '';
    if (i === todayIdx && lastWatched) {
      const lastStr  = lastWatched.toISOString().split('T')[0];
      const todayStr = today.toISOString().split('T')[0];
      cls = lastStr === todayStr ? 'today' : '';
    } else if (i < todayIdx) {
      const diffDays = todayIdx - i;
      cls = lastWatched && diffDays <= p.streak_count ? 'done' : '';
    }
    const check = cls === 'today'
      ? `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`
      : cls === 'done'
      ? `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="#C0392B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`
      : '';
    return `<div class="streak-day">
      <div class="streak-dot ${cls}">${check}</div>
      <div class="streak-day-label${cls === 'today' ? ' today-label-day' : ''}">${d}</div>
    </div>`;
  }).join('');

  const rankDefs = [
    {name:'Newbie',min:0,max:9},
    {name:'Movie Watcher',min:10,max:19},
    {name:'Movie Buff',min:20,max:29},
    {name:'Movie Freak',min:30,max:49},
    {name:'Cinephile',min:50,max:99},
    {name:'Cinéaste',min:100,max:9999}
  ];

  const rankListHtml = rankDefs.map((r, i) => {
    let barCls = 'rank-bar', nameCls = 'rank-name', w = '0%';
    if (watched > r.max)       { barCls = 'rank-bar done';    nameCls = 'rank-name done';    w = '100%'; }
    else if (watched >= r.min) { barCls = 'rank-bar current'; nameCls = 'rank-name current'; w = Math.round(((watched - r.min) / (r.max - r.min + 1)) * 100) + '%'; }
    return `<div class="rank-item"><span class="rank-n">${i+1}</span><div class="rank-bar-wrap"><div class="${barCls}" style="width:${w}"></div></div><span class="${nameCls}">${r.name}</span><span class="rank-movies">${r.min===100?'100+':r.min===0?'1–9':r.min}</span></div>`;
  }).join('');

  const next = rankDefs.find(r => watched < r.min);

  const quoteHtml = p.favorite_quote
    ? `<div class="quote-display" onclick="editField('quote')">"${escHtml(p.favorite_quote)}"</div>`
    : `<div class="quote-display" onclick="editField('quote')" style="color:var(--text-hint);font-style:normal">Tap to add your favourite movie line...</div>`;

  const favAllTimeHtml = p.favorite_movie_alltime
    ? `<div class="fav-movie-display" onclick="editField('alltime')"><span>${escHtml(p.favorite_movie_alltime)}</span><span style="font-size:11px;color:var(--text-hint)">edit</span></div>`
    : `<div class="fav-movie-display" onclick="editField('alltime')"><span style="color:var(--text-hint)">Tap to add...</span></div>`;

  const favNowHtml = p.favorite_movie_now
    ? `<div class="fav-movie-display" onclick="editField('now')"><span>${escHtml(p.favorite_movie_now)}</span><span style="font-size:11px;color:var(--text-hint)">edit</span></div>`
    : `<div class="fav-movie-display" onclick="editField('now')"><span style="color:var(--text-hint)">Tap to add...</span></div>`;

  document.getElementById('pane-profile').innerHTML = `
  <div class="profile-hero">
    <div class="profile-top">
      <div class="avatar-lg" id="avatar-display" style="cursor:pointer;overflow:hidden;position:relative">
        ${avatarHtml}
        <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.5);font-size:9px;color:#fff;text-align:center;padding:3px 0">
          ${p.avatar_url ? 'View / Edit' : 'Add photo'}
        </div>
      </div>
      <div>
        <div class="profile-name">${escHtml(p.username)}</div>
        <div class="profile-join">Member since ${joined}</div>
        <div class="rank-badge-lg">${rank}</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${watched}</div><div class="stat-label">Films watched</div></div>
      <div class="stat-card"><div class="stat-val">${streak}</div><div class="stat-label">Day streak</div></div>
      <div class="stat-card"><div class="stat-val">${stars}</div><div class="stat-label">Stars earned</div></div>
    </div>
  </div>

  <div class="block">
    <div class="block-title">Favourite movie line</div>
    ${quoteHtml}
    <div class="edit-hint">Tap to edit</div>
  </div>

  <div class="block">
    <div class="block-title">Favourite films</div>
    <div style="font-size:12px;color:var(--text-hint);margin-bottom:4px">All time</div>
    ${favAllTimeHtml}
    <div style="height:0.5px;background:var(--border);margin:8px 0"></div>
    <div style="font-size:12px;color:var(--text-hint);margin-bottom:4px">Right now</div>
    ${favNowHtml}
    <div class="edit-hint">Tap to edit</div>
  </div>

  <div id="edit-panel" style="display:none" class="block">
    <div class="block-title" id="edit-panel-title">Edit</div>
    <textarea class="edit-field" id="edit-input" rows="2" placeholder=""></textarea>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="save-btn" onclick="saveField()">Save</button>
      <button class="action-btn" style="flex:none;padding:8px 16px;font-size:13px" onclick="cancelEdit()">Cancel</button>
    </div>
  </div>

  <div class="block">
    <div class="block-title">This week's streak</div>
    <div class="streak-row">${streakDots}</div>
    <div class="streak-count"><span class="streak-num">${streak}</span><span class="streak-text">day streak — keep it going</span></div>
  </div>

  <div class="block">
    <div class="block-title">Rank journey</div>
    <div class="rank-list">${rankListHtml}</div>
    ${next
      ? `<div class="rank-next">${next.min - watched} more films to reach <span style="color:var(--red)">${next.name}</span></div>`
      : `<div class="rank-next" style="color:var(--gold)">You have reached the highest rank — Cinéaste!</div>`}
  </div>

  <button class="action-btn" style="width:100%;margin-bottom:10px" onclick="shareProfile()">Share my profile</button>
  <button class="action-btn" style="width:100%;color:#eb5757;border-color:#7d2e2e" onclick="doLogout()">Sign out</button>`;

  document.getElementById('avatar-display').addEventListener('click', () => {
    if (currentProfile?.avatar_url) {
      showAvatarModal(currentProfile.avatar_url);
    } else {
      document.getElementById('avatar-input').click();
    }
  });
}

function editField(field) {
  editingField = field;
  const panel = document.getElementById('edit-panel');
  const input = document.getElementById('edit-input');
  const title = document.getElementById('edit-panel-title');
  if (!panel || !input) return;
  if (field === 'quote') {
    title.textContent = 'Your favourite movie line';
    input.placeholder = 'e.g. "Get busy living, or get busy dying."';
    input.value = currentProfile.favorite_quote || '';
    input.rows = 3;
  } else if (field === 'alltime') {
    title.textContent = 'Favourite film of all time';
    input.placeholder = 'e.g. The Godfather';
    input.value = currentProfile.favorite_movie_alltime || '';
    input.rows = 1;
  } else if (field === 'now') {
    title.textContent = 'Favourite film right now';
    input.placeholder = 'e.g. Parasite';
    input.value = currentProfile.favorite_movie_now || '';
    input.rows = 1;
  }
  panel.style.display = 'block';
  input.focus();
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

async function saveField() {
  const input = document.getElementById('edit-input');
  const value = input.value.trim();
  const updates = {};
  if (editingField === 'quote')   updates.favorite_quote = value;
  if (editingField === 'alltime') updates.favorite_movie_alltime = value;
  if (editingField === 'now')     updates.favorite_movie_now = value;
  const { error } = await sb.from('profiles').update(updates).eq('id', currentUser.id);
  if (error) { toast('Could not save. Try again.'); return; }
  currentProfile = { ...currentProfile, ...updates };
  document.getElementById('edit-panel').style.display = 'none';
  editingField = null;
  renderProfile();
  toast('Saved!');
}

function cancelEdit() {
  document.getElementById('edit-panel').style.display = 'none';
  editingField = null;
}

async function uploadAvatar(input) {
  const file = input.files && input.files[0];
  if (!file) { toast('No file selected.'); return; }
  if (file.size > 2 * 1024 * 1024) { toast('Image must be under 2MB.'); return; }
  toast('Uploading...');
  try {
    const ext  = file.name.includes('.') ? file.name.split('.').pop() : 'jpg';
    const path = `${currentUser.id}/avatar.${ext}`;
    const { error: uploadError } = await sb.storage
      .from('avatars')
      .upload(path, file, { upsert: true, contentType: file.type });
    if (uploadError) { toast('Upload failed: ' + uploadError.message); return; }
    const { data: urlData } = sb.storage.from('avatars').getPublicUrl(path);
    const avatarUrl = urlData.publicUrl + '?t=' + Date.now();
    const { error: updateError } = await sb.from('profiles').update({ avatar_url: avatarUrl }).eq('id', currentUser.id);
    if (updateError) { toast('Could not save avatar.'); return; }
    currentProfile.avatar_url = avatarUrl;
    updateNavAvatar();
    renderProfile();
    toast('Profile picture updated!');
  } catch (err) {
    toast('Something went wrong. Try again.');
  }
}

async function loadQuizHistory() {
  if (!currentUser) return;
  const { data } = await sb.from('quiz_results')
    .select('*, movies(title)')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false })
    .limit(30);
  const pane = document.getElementById('pane-history');
  if (!data || data.length === 0) {
    pane.innerHTML = `<div class="no-comments" style="padding:40px 0">No quiz results yet — finish today's film to get started!</div>`;
    return;
  }
  const starMovies = data.filter(r => r.perfect);
  pane.innerHTML = `
  ${starMovies.length ? `
  <div class="block">
    <div class="block-title">Stars earned</div>
    <div class="stars-grid">${starMovies.map(r => `<div class="star-chip">★ ${escHtml(r.movies?.title || '')}</div>`).join('')}</div>
  </div>` : ''}
  <div class="block">
    <div class="block-title">All quiz results</div>
    ${data.map(r => `
    <div class="rank-item">
      <div style="flex:1;font-size:13px;color:var(--text)">${escHtml(r.movies?.title || 'Unknown')}</div>
      <div style="font-size:13px;font-weight:500;color:${r.perfect ? 'var(--gold)' : r.score >= 3 ? '#6fcf97' : 'var(--text-hint)'}">${r.score}/5${r.perfect ? ' ★' : ''}</div>
    </div>`).join('')}
  </div>`;
}

function shareProfile() {
  const text = `Check out my MOVIEZ profile — I'm a ${getRank(currentProfile?.total_watched || 0)}!`;
  if (navigator.share) { navigator.share({ title: 'MOVIEZ', text, url: window.location.href }); }
  else { navigator.clipboard.writeText(window.location.href); toast('Link copied!'); }
}

async function doLogout() {
  if (!confirm('Sign out of MOVIEZ?')) return;
  await sb.auth.signOut();
  window.location.href = 'login.html';
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pane-' + name).classList.add('active');
}

init();
</script>
</body>
</html>
